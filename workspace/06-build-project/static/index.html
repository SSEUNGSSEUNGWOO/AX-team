<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할일 관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      color: #1a1a2e;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus { border-color: #6c63ff; }

    .input-row input.error {
      border-color: #ff4d4f;
      animation: shake 0.25s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .btn-add {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover { background: #574fd6; }
    .btn-add:active { transform: scale(0.97); }

    .error-msg {
      font-size: 0.82rem;
      color: #ff4d4f;
      margin-bottom: 12px;
      min-height: 18px;
      padding-left: 4px;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 6px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #6c63ff; color: #6c63ff; }

    .filter-btn.active {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done { opacity: 0.5; }

    .todo-check {
      width: 22px;
      height: 22px;
      border: 2px solid #c5c5d3;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .todo-item.done .todo-check {
      background: #6c63ff;
      border-color: #6c63ff;
    }

    .todo-check::after {
      content: '';
      display: none;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .todo-item.done .todo-check::after { display: block; }

    .todo-title {
      flex: 1;
      font-size: 0.97rem;
      line-height: 1.4;
      word-break: break-all;
    }

    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: #999;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #c5c5d3;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: #ff4d4f; }

    .empty-msg {
      text-align: center;
      color: #aaa;
      font-size: 0.92rem;
      padding: 40px 0;
    }

    .summary {
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 16px;
      padding-left: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 할일 목록</h1>

    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="할일을 입력하세요"
        maxlength="200"
        autocomplete="off"
      />
      <button class="btn-add" id="btn-add">추가</button>
    </div>
    <p class="error-msg" id="error-msg" aria-live="polite"></p>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">진행중</button>
      <button class="filter-btn" data-filter="done">완료</button>
    </div>

    <p class="summary" id="summary"></p>
    <div class="todo-list" id="todo-list"></div>
  </div>

  <script>
    const STORAGE_KEY = 'todos_v1';
    let currentFilter = 'all';

    function loadTodos() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveTodos(todos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function createId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function getFiltered(todos) {
      if (currentFilter === 'active') return todos.filter(t => !t.done);
      if (currentFilter === 'done')   return todos.filter(t => t.done);
      return todos;
    }

    function render() {
      const todos    = loadTodos();
      const filtered = getFiltered(todos);
      const list     = document.getElementById('todo-list');
      const summary  = document.getElementById('summary');
      const doneCount = todos.filter(t => t.done).length;

      summary.textContent = todos.length
        ? `전체 ${todos.length}개 · 완료 ${doneCount}개`
        : '';

      if (filtered.length === 0) {
        list.innerHTML = `<p class="empty-msg">${
          currentFilter === 'done' ? '완료된 항목이 없어요' :
          currentFilter === 'active' ? '진행 중인 항목이 없어요' :
          '할일을 추가해보세요'
        }</p>`;
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <div class="todo-item ${todo.done ? 'done' : ''}" data-id="${todo.id}">
          <div class="todo-check" data-action="toggle" title="완료 토글"></div>
          <span class="todo-title">${escapeHtml(todo.title)}</span>
          <button class="btn-delete" data-action="delete" title="삭제">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const errEl = document.getElementById('error-msg');
      const title = input.value.trim();

      if (!title) {
        errEl.textContent = '할일을 입력해주세요.';
        input.classList.add('error');
        input.focus();
        setTimeout(() => { input.classList.remove('error'); errEl.textContent = ''; }, 1500);
        return;
      }

      const todos = loadTodos();
      todos.push({ id: createId(), title, done: false, createdAt: Date.now() });
      saveTodos(todos);
      input.value = '';
      errEl.textContent = '';
      render();
    }

    function toggleTodo(id) {
      const todos = loadTodos();
      const todo  = todos.find(t => t.id === id);
      if (todo) { todo.done = !todo.done; saveTodos(todos); render(); }
    }

    function deleteTodo(id) {
      saveTodos(loadTodos().filter(t => t.id !== id));
      render();
    }

    // 이벤트
    document.getElementById('btn-add').addEventListener('click', addTodo);
    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.getElementById('todo-list').addEventListener('click', e => {
      const item = e.target.closest('.todo-item');
      if (!item) return;
      const id     = item.dataset.id;
      const action = e.target.dataset.action || e.target.closest('[data-action]')?.dataset.action;
      if (action === 'toggle') toggleTodo(id);
      if (action === 'delete') deleteTodo(id);
    });

    document.querySelector('.filter-row').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });

    render();
  </script>
</body>
</html>
